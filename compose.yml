# ── Reusable Variables ───────────────────────────────────────────────────────
x-var:
  - &PORT "7860"
  - &MEM_LIMIT 6g

# Reusable environment for all services
x-common-env: &common-env
  HF_TOKEN: ${HF_TOKEN:-}
  GRADIO_ANALYTICS_ENABLED: "False"

x-common-build: &common-build
  context: app
  dockerfile: Containerfile
  args:
    VERSION: ${AGNAV_VERSION:-dev}

# Standard service boilerplate: Resource limits and Persistence
x-service-defaults: &service-defaults
  mem_limit: *MEM_LIMIT
  memswap_limit: *MEM_LIMIT
  volumes: []

# Development volumes: Enables live-reload while protecting internal container data
x-dev-volumes: &dev-volumes
  - ./app:/app:z
  - /app/.venv         # Lifeboat for packages
  - ./app/pyproject.toml:/app/pyproject.toml:ro
  - ./app/uv.lock:/app/uv.lock:ro
  - ./reports:/app/reports:z  # Artifact extraction "Lifeboat"
  - /hf_cache      # Lifeboat for the model
  - /app/.pytest_cache # Lifeboat for test metadata

services:



  # ── test-unit (Containerized Unit Tests) ─────────────────────────────────────
  test-unit:
    <<: *service-defaults
    profiles: [test, all]
    build:
      <<: *common-build
      target: functional_builder
    environment:
      <<: *common-env
      AGNAV_FORCE_PERSPECTIVES: "true"
      PYTHONPATH: /app
    command: >
      sh -c "VERIFY_ENABLED=true uv run --no-sync python -m pytest tests/test_*.py -v 
      --junitxml=reports/junit.xml 
      --cov=indexing --cov=main --cov-report=xml:reports/coverage.xml"

  # ── verify (Cache Validator) ──────────────────────────────────────────────────
  verify:
    <<: *service-defaults
    profiles: [verify, all]
    build:
      <<: *common-build
      target: functional_builder
    environment: *common-env
    command: /app/.venv/bin/python scripts/generate_cache_manifest.py validate

  # ── Local LLM (Ollama) ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: [dev, integration, e2e, all]
    ports: ["11434:11434"]
    environment:
      - OLLAMA_FLASH_ATTENTION=1
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-time service to pull the required model into the ollama volume.
  ollama-init:
    image: ollama/ollama:latest
    profiles: [dev, integration, e2e, all]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./app/main.py:/app/main.py:ro
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    command: 
      - -c
      - |
        TARGET_MODEL=$$(sed -n 's/.*OLLAMA_MODEL_ID = "\(.*\)".*/\1/p' /app/main.py)
        echo "Determined target model from main.py: $$TARGET_MODEL"
        ollama pull $$TARGET_MODEL

  # ── test-integration (RAG Pipeline Integration Tests) ───────────────────────
  test-integration:
    <<: *service-defaults
    profiles: [integration, all]
    build:
      <<: *common-build
      target: functional_builder
    environment:
      <<: *common-env
      AGNAV_FORCE_PERSPECTIVES: "true"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    command: >
      sh -c "uv run --no-sync python -m pytest tests/integration/ -v"

  # ── test-e2e (Full Flow / Functional Tests) ─────────────────────────────────
  test-e2e:
    <<: *service-defaults
    profiles: [e2e, all]
    build:
      <<: *common-build
      target: functional_builder
    volumes: []
    environment:
      <<: *common-env
      PYTHONPATH: /app
      AGNAV_LLM_PROVIDER: ollama
      OLLAMA_HOST: ollama
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    command: >
      sh -c "uv run --no-sync python -m pytest tests/test_rag_stream.py -v"

  # ── dev (Local Development with Hot-Reload) ──────────────────────────────────
  # Mounts source code to allow instant feedback.
  dev:
    <<: *service-defaults
    user: "${UID:-1000}:${GID:-1000}"
    profiles: [dev, all]
    build:
      <<: *common-build
      target: test_builder
    volumes: *dev-volumes
    environment:
      <<: *common-env
      WATCHFILES_FORCE_POLLING: "true"
      PORT: *PORT
    ports:
      - "*7860:7860"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c "uv run watchfiles 'uv run python main.py' ."

  # ── Staging Simulation (Immutable Cloud-Parity) ───────────────────────────
  # Run with: podman compose --profile staging up staging
  staging:
    <<: *service-defaults
    profiles: [staging, all]
    build: *common-build
    environment:
      <<: *common-env
      AGNAV_LLM_PROVIDER: huggingface
      PORT: *PORT
    ports:
      - "7861:7860"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── test-smoke (The Grand Slam Auditor) ─────────────────────────────────────
  test-smoke:
    <<: *service-defaults
    profiles: [smoke, all]
    build:
      <<: *common-build
      target: functional_builder
    environment:
      <<: *common-env
      SMOKE_TARGET_DEV: "http://dev:7860"
      SMOKE_TARGET_STAGING: "http://staging:7860"
    depends_on:
      dev:
        condition: service_healthy
      staging:
        condition: service_healthy
    command: >
      sh -c "uv run --no-sync python scripts/smoke_multi.py"

volumes:
  ollama_data: {}
