# ── Reusable Variables
x-var:
  - &PORT "7860"
  - &MEM_LIMIT 6g

# Reusable environment for all services
x-common-env: &common-env
  HF_TOKEN: ${HF_TOKEN:-}
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  EMBED_MODEL: /model
  OLLAMA_HOST: ollama:11434
  OLLAMA_MODEL_ID: tinyllama

x-test-env: &test-env
  <<: *common-env
  OLLAMA_MODEL_ID: tinyllama
  AGNAV_FORCE_PERSPECTIVES: "true"
x-healthcheck: &app-healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:7860/"]
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 120s

x-common-build: &common-build
  context: app
  dockerfile: Containerfile
  args:
    VERSION: ${AGNAV_VERSION:-dev}

x-build-dev: &build-dev
  <<: *common-build
  target: functional_builder

x-build-staging: &build-staging
  <<: *common-build

# Standard service boilerplate: Resource limits and Persistence
x-service-defaults: &service-defaults
  mem_limit: *MEM_LIMIT
  memswap_limit: *MEM_LIMIT
  volumes: []

# Development volumes: Enables live-reload while protecting internal container data
x-dev-volumes: &dev-volumes
  - ./app:/app:z
  - /app/.venv         # Lifeboat for packages
  - ./app/pyproject.toml:/app/pyproject.toml:ro
  - ./app/uv.lock:/app/uv.lock:ro
  - ./reports:/app/reports:z  # Artifact extraction "Lifeboat"
  - ./.pdf_cache:/app/.pdf_cache:z     # Persistent, writable index
  - ./.pytest_cache:/app/.pytest_cache:z # Persistent test metadata

services:


  # ── Main Application
  # Development with Hot-Reload (Ollama)
  dev: &dev-service
    container_name: vexilon-dev
    <<: *service-defaults
    user: "${UID:-1000}:${GID:-1000}"
    image: vexilon:dev
    build: *build-dev
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    volumes: *dev-volumes
    environment:
      <<: *common-env
      WATCHFILES_FORCE_POLLING: "true"
      PORT: *PORT
    mem_limit: 2g
    memswap_limit: 2g
    ports:
      - "7860:7860"
    healthcheck: *app-healthcheck
    command: >
      sh -c "cd /app && CHAINLIT_FILES_DIR=/app/.pdf_cache/.files uv run watchfiles --filter python 'uv run chainlit run main.py --host 0.0.0.0 --port 7860 --headless' ."

  dev-test:
    <<: *dev-service
    container_name: vexilon-dev-test
    depends_on:
      ollama-init-test:
        condition: service_completed_successfully
    environment:
      <<: *test-env
      WATCHFILES_FORCE_POLLING: "true"
      PORT: *PORT
    ports: [] # Prevent conflict with running dev instances
    volumes: [] # Use baked-in cache, don't mount host directories

  # Staging with Immutable Cloud-Parity (HuggingFace Inference)
  staging:
    container_name: vexilon-staging
    <<: *service-defaults
    image: vexilon:staging
    build: *build-staging
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      <<: *common-env
      AGNAV_LLM_PROVIDER: huggingface
      PORT: *PORT
    ports:
      - "7861:7860"
    healthcheck: *app-healthcheck

  # ── Local LLM (Ollama)
  ollama:
    container_name: vexilon-ollama
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    environment:
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ${OLLAMA_DATA_PATH:-ollama_data}:/root/.ollama
    mem_limit: 4g
    memswap_limit: 4g
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-time service to pull the required model into the ollama volume.
  ollama-init: &ollama-init-service
    container_name: vexilon-ollama-init
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./app/main.py:/app/main.py:ro
    environment:
      <<: *common-env
    entrypoint: /bin/sh

    command:
      - -c
      - |
        TARGET_MODEL=$${OLLAMA_MODEL_ID:-tinyllama}
        echo "Pulling model: $$TARGET_MODEL"
        ollama pull $$TARGET_MODEL
  ollama-init-test:
    <<: *ollama-init-service
    container_name: vexilon-ollama-init-test
    environment:
      <<: *test-env
    command:
      - -c
      - |
        TARGET_MODEL=$${OLLAMA_MODEL_ID:-$$(sed -n 's/.*OLLAMA_MODEL_ID = "\(.*\)".*/\1/p' /app/main.py)}
        echo "Determined target model: $$TARGET_MODEL"
        # Intelligent fallback: If model-pull fails, we don't crash the whole test suite
        ollama pull $$TARGET_MODEL || echo "Failed to pull $$TARGET_MODEL, continuing..."

  # ── Tests
  # Pure logic tests with fully mocked external dependencies.
  # Fast, zero RAM footprint, runs on every commit.
  test-unit:
    container_name: vexilon-test-unit
    <<: *service-defaults
    image: vexilon:test-unit
    build:
      <<: *common-build
      target: test_builder
    environment: *test-env
    # Shared healthcheck not needed for one-off test runners
    command: >
      sh -c "VERIFY_ENABLED=true uv run --no-sync python -m pytest tests/test_*.py -v 
      --junitxml=reports/junit.xml 
      --cov=indexing --cov=main --cov-report=xml:reports/coverage.xml"

  # Validates integration between app code and the local model services.
  # Hits live Ollama instance; requires pre-warmed model weights.
  test-integration-model:
    container_name: vexilon-test-integration-model
    <<: *service-defaults
    image: vexilon:dev
    build: *build-dev
    depends_on:
      test-cache:
        condition: service_completed_successfully
      ollama-init-test:
        condition: service_completed_successfully
    environment: *test-env
    command: >
      sh -c "uv run --no-sync python -m pytest tests/integration/ -v"

  # Functional tests for the internal RAG streaming logic.
  # Verifies end-to-end Python flow from query to token with a mocked LLM.
  test-integration-app:
    container_name: vexilon-test-integration-app
    <<: *service-defaults
    image: vexilon:dev
    build: *build-dev
    depends_on:
      test-cache:
        condition: service_completed_successfully
    volumes: []
    environment:
      <<: *test-env
      PYTHONPATH: /app
      AGNAV_LLM_PROVIDER: mock
    command: >
      sh -c "uv run --no-sync python -m pytest tests/test_rag_stream.py -v"

  # Integrity gate for the pre-computed FAISS index.
  # Ensures the baked-in vector store matches the expected manifest.
  test-cache:
    container_name: vexilon-test-cache
    <<: *service-defaults
    image: vexilon:dev
    build: *build-dev
    environment: *common-env
    command: /app/.venv/bin/python scripts/generate_cache_manifest.py validate

  # True End-to-End tests against the live running Chainlit application.
  # Verifies actual HTTP responses from both Dev (Ollama) and Staging (HF).
  test-e2e:
    container_name: vexilon-test-e2e
    <<: *service-defaults
    image: vexilon:dev
    build: *build-dev
    depends_on:
      dev-test:
        condition: service_healthy
      staging:
        condition: service_healthy
      test-cache:
        condition: service_completed_successfully
    environment:
      <<: *test-env
      SMOKE_TARGET_DEV: "http://dev-test:7860"
      SMOKE_TARGET_STAGING: "http://staging:7860"
    command: >
      sh -c "uv run --no-sync python scripts/smoke_multi.py"

  # The final synchronization gate for the entire repository.
  # Only succeeds if all parallel unit, integration, and E2E suites pass.
  test-everything:
    container_name: vexilon-test-everything
    <<: *service-defaults
    image: vexilon:dev
    build: *build-dev
    depends_on:
      test-unit:
        condition: service_completed_successfully
      test-integration-model:
        condition: service_completed_successfully
      test-integration-app:
        condition: service_completed_successfully
      test-e2e:
        condition: service_completed_successfully
    command: >
      sh -c "echo 'ALL SYSTEMS VERIFIED'"

volumes:
  ollama_data: {}
