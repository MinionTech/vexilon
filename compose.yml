# ── Reusable Variables
x-var:
  - &PORT "7860"
  - &MEM_LIMIT 6g

# Reusable environment for all services
x-common-env: &common-env
  HF_TOKEN: ${HF_TOKEN:-}
  GRADIO_ANALYTICS_ENABLED: "False"
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  EMBED_MODEL: /model
  OLLAMA_HOST: ollama:11434

x-common-build: &common-build
  context: app
  dockerfile: Containerfile
  args:
    VERSION: ${AGNAV_VERSION:-dev}

# Standard service boilerplate: Resource limits and Persistence
x-service-defaults: &service-defaults
  mem_limit: *MEM_LIMIT
  memswap_limit: *MEM_LIMIT
  volumes: []

# Development volumes: Enables live-reload while protecting internal container data
x-dev-volumes: &dev-volumes
  - ./app:/app:z
  - /app/.venv         # Lifeboat for packages
  - ./app/pyproject.toml:/app/pyproject.toml:ro
  - ./app/uv.lock:/app/uv.lock:ro
  - ./reports:/app/reports:z  # Artifact extraction "Lifeboat"
  - ./.pdf_cache:/app/.pdf_cache:z     # Persistent, writable index
  - ./.pytest_cache:/app/.pytest_cache:z # Persistent test metadata

services:

  # ── Master Image Builders
  # These services act as the single source of truth for builds.
  # Other services depend on the images produced here to avoid redundant builds.

  build-dev:
    container_name: vexilon-build-dev
    <<: *service-defaults
    profiles: [all, test, dev, integration, e2e, smoke, verify]
    image: vexilon:dev
    build:
      <<: *common-build
      target: functional_builder

  build-staging:
    container_name: vexilon-build-staging
    <<: *service-defaults
    profiles: [all, staging]
    image: vexilon:staging
    build: *common-build

  # ── Test Containers
  test-unit:
    container_name: vexilon-test-unit
    <<: *service-defaults
    profiles: [test, all]
    image: vexilon:dev
    depends_on:
      build-dev:
        condition: service_started
    environment:
      <<: *common-env
      AGNAV_FORCE_PERSPECTIVES: "true"
      PYTHONPATH: /app
    command: >
      sh -c "VERIFY_ENABLED=true uv run --no-sync python -m pytest tests/test_*.py -v 
      --junitxml=reports/junit.xml 
      --cov=indexing --cov=main --cov-report=xml:reports/coverage.xml"

  test-integration:
    container_name: vexilon-test-integration
    <<: *service-defaults
    profiles: [integration, all]
    image: vexilon:dev
    depends_on:
      test-unit:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      AGNAV_FORCE_PERSPECTIVES: "true"
    command: >
      sh -c "uv run --no-sync python -m pytest tests/integration/ -v"

  test-e2e:
    container_name: vexilon-test-e2e
    <<: *service-defaults
    profiles: [e2e, all]
    image: vexilon:dev
    depends_on:
      test-integration:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    volumes: []
    environment:
      <<: *common-env
      PYTHONPATH: /app
      AGNAV_LLM_PROVIDER: ollama
      OLLAMA_HOST: ollama
    command: >
      sh -c "uv run --no-sync python -m pytest tests/test_rag_stream.py -v"

  # ── verify (Cache Validator)
  verify:
    container_name: vexilon-verify
    <<: *service-defaults
    profiles: [verify]
    image: vexilon:dev
    depends_on:
      build-dev:
        condition: service_started
    environment: *common-env
    command: /app/.venv/bin/python scripts/generate_cache_manifest.py validate

  # ── Local LLM (Ollama)
  ollama:
    container_name: vexilon-ollama
    image: ollama/ollama:latest
    profiles: [dev, integration, e2e, all]
    ports: ["11434:11434"]
    environment:
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-time service to pull the required model into the ollama volume.
  ollama-init:
    container_name: vexilon-ollama-init
    image: ollama/ollama:latest
    profiles: [all, dev, integration, e2e]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./app/main.py:/app/main.py:ro
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    command: 
      - -c
      - |
        TARGET_MODEL=$$(sed -n 's/.*OLLAMA_MODEL_ID = "\(.*\)".*/\1/p' /app/main.py)
        echo "Determined target model from main.py: $$TARGET_MODEL"
        ollama pull $$TARGET_MODEL

  # ── dev (Local Development with Hot-Reload)
  dev:
    container_name: vexilon-dev
    <<: *service-defaults
    user: "${UID:-1000}:${GID:-1000}"
    profiles: [dev, all]
    image: vexilon:dev
    depends_on:
      build-dev:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    volumes: *dev-volumes
    environment:
      <<: *common-env
      WATCHFILES_FORCE_POLLING: "true"
      PORT: *PORT
    ports:
      - "7860:7860"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860')"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c "uv run watchfiles --ignore-paths .pdf_cache,data,reports 'uv run python main.py' ."

  # ── Staging Simulation (Immutable Cloud-Parity)
  staging:
    container_name: vexilon-staging
    <<: *service-defaults
    profiles: [staging, all]
    image: vexilon:staging
    depends_on:
      build-staging:
        condition: service_started
    environment:
      <<: *common-env
      AGNAV_LLM_PROVIDER: huggingface
      PORT: *PORT
    ports:
      - "7861:7860"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860')"]
      interval: 10s
      timeout: 5s
      retries: 5

  test-smoke:
    container_name: vexilon-test-smoke
    <<: *service-defaults
    profiles: [smoke, all]
    image: vexilon:dev
    depends_on:
      test-e2e:
        condition: service_completed_successfully
      dev:
        condition: service_healthy
      staging:
        condition: service_healthy
    environment:
      <<: *common-env
      SMOKE_TARGET_DEV: "http://dev:7860"
      SMOKE_TARGET_STAGING: "http://staging:7860"
    command: >
      sh -c "uv run --no-sync python scripts/smoke_multi.py"

  test-everything:
    container_name: vexilon-test-everything
    <<: *service-defaults
    profiles: [all]
    image: vexilon:dev
    depends_on:
      test-smoke:
        condition: service_completed_successfully
    command: >
      sh -c "echo '🏆 GRAND SLAM SUCCESS: ALL SYSTEMS VERIFIED'"

volumes:
  ollama_data: {}
