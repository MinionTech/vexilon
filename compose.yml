services:

  # ── Vexilon app ───────────────────────────────────────────────────────────────
  vexilon:
    build:
      context: .
      dockerfile: Containerfile
    container_name: vexilon
    environment:
      # Mandatory: Anthropic API key
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      
      # Optional: Basic Auth (Login is disabled if VEXILON_PASSWORD is empty)
      VEXILON_USERNAME: ${VEXILON_USERNAME:-admin}
      VEXILON_PASSWORD: ${VEXILON_PASSWORD:-}
      
      PORT: "7860"
    ports:
      - "7860:7860"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp                  # Writable tmp for Gradio and other runtime files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      tests:
        condition: service_completed_successfully
    volumes:
      - ./pdf_cache:/app/pdf_cache:Z
      - ./hf_cache:/app/hf_cache:Z
    # Production-ready: Use the code baked into the image
    
    # Production-optimized: Uses the CMD defined in the Containerfile
    # (No 'uv' or 'gradio' CLI required in the final image)

  # ── Testing ──────────────────────────────────────────────────────────────────
  # Run with: podman-compose run --rm tests
  tests:
    build:
      context: .
      dockerfile: Containerfile
      target: builder
    volumes:
      - ./app.py:/app/app.py:Z
      - ./tests:/app/tests:Z
      - ./pyproject.toml:/app/pyproject.toml:Z
      - ./uv.lock:/app/uv.lock:Z
      - ./conftest.py:/app/conftest.py:Z
      - ./compose.yml:/app/compose.yml:Z
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HF_HOME: /app/hf_cache
      TRANSFORMERS_OFFLINE: "1"
      PYTHONPATH: "/app"
    # We use python -m pytest to ensure /app is in the sys.path for module discovery
    command: sh -c "uv sync --frozen && uv run python -m pytest tests/test_*.py tests/integration/ -v"
