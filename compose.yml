# ── Reusable Variables ───────────────────────────────────────────────────────
x-var:
  - &PORT "7860"
  - &MEM_LIMIT 3g

# Reusable environment for all services
x-common-env: &common-env
  HF_TOKEN: ${HF_TOKEN:-}
  HF_HOME: /hf_cache
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  EMBED_MODEL: /hf_cache

x-common-build: &common-build
  context: .
  dockerfile: Containerfile

# Standard service boilerplate: Resource limits and Persistence
x-service-defaults: &service-defaults
  mem_limit: *MEM_LIMIT
  memswap_limit: *MEM_LIMIT
  volumes:
    - ./.pdf_cache:/app/.pdf_cache:z

# Development volumes: Enables live-reload while protecting internal container data
x-dev-volumes: &dev-volumes
  - .:/app:z
  - ./.pdf_cache:/app/.pdf_cache:z
  - ./reports:/app/reports:z  # Artifact extraction "Lifeboat"
  - /app/.venv         # Lifeboat for packages
  - /hf_cache      # Lifeboat for the model
  - /app/.pytest_cache # Lifeboat for test metadata

services:

  # ── Vexilon (Default: Local Dev with Hot-Reload) ─────────────────────────────
  # Mounts source code to allow instant feedback. No profile = starts by default.
  vexilon:
    <<: *service-defaults
    build:
      <<: *common-build
      target: test_builder
    volumes: *dev-volumes
    environment:
      <<: *common-env
      WATCHFILES_FORCE_POLLING: "true"
      PORT: *PORT
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "${PORT:-7860}:7860"
    command: /usr/local/bin/uv run --no-sync gradio app.py --watch-dirs .
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:7860')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Production Simulation (Immutable Cloud-Parity) ───────────────────────────
  # Run with: podman compose up prod
  prod:
    <<: *service-defaults
    profiles: [prod]
    build: *common-build
    environment:
      <<: *common-env
      VEXILON_LLM_PROVIDER: huggingface
    ports:
      - "${PORT:-7860}:7860"
    cap_drop: [ALL]
    tmpfs: [/tmp]

  # ── Testing ──────────────────────────────────────────────────────────────────
  tests:
    <<: *service-defaults
    profiles: [test]
    build:
      <<: *common-build
      target: test_builder
    volumes: *dev-volumes
    environment: *common-env
    command: >
      sh -c "uv run --no-sync python -m pytest tests/test_*.py tests/integration/ -v 
      --junitxml=reports/junit.xml 
      --cov=vexilon --cov=app --cov-report=xml:reports/coverage.xml"
    depends_on:
      index-refresh:
        condition: service_completed_successfully

  # ── Cache Refresh ────────────────────────────────────────────────────────────
  index-refresh:
    <<: *service-defaults
    profiles: [tools]
    build:
      <<: *common-build
      target: builder
    environment: *common-env
    command: python scripts/build_index.py

  # ── Cache Validator ─────────────────────────────────────────────────────────
  cache-validator:
    <<: *service-defaults
    profiles: [tools]
    build:
      <<: *common-build
      target: test_builder
    volumes: *dev-volumes
    environment: *common-env
    command: uv run --no-sync python scripts/generate_cache_manifest.py validate

  # ── Local LLM (Ollama) ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-time service to pull the required model into the ollama volume.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./app.py:/app/app.py:ro
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    command: 
      - -c
      - |
        TARGET_MODEL=$$(sed -n 's/.*OLLAMA_MODEL_ID = "\(.*\)".*/\1/p' /app/app.py)
        echo "Determined target model from app.py: $$TARGET_MODEL"
        ollama pull $$TARGET_MODEL

volumes:
  ollama_data: {}
