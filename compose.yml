# ── Reusable Variables ───────────────────────────────────────────────────────
x-var:
  - &PORT "7860"
  - &MEM_LIMIT 3g

# Reusable environment for all services
x-common-env: &common-env
  VEXILON_LLM_PROVIDER: ${VEXILON_LLM_PROVIDER:-huggingface}
  HF_TOKEN: ${HF_TOKEN:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_API_BASE: ${OPENAI_API_BASE:-}
  OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://ollama:11434/v1}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
  HF_HOME: /app/hf_cache
  HF_HUB_OFFLINE: "1"
  HF_TOKEN_PATH: /dev/null # Prevent HuggingFace token lookup permission errors
  PATH: "/app/.venv/bin:/app/:$PATH"
  PYTHONPATH: "/app"
  TRANSFORMERS_OFFLINE: "1"
  EMBED_MODEL: /app/hf_cache

# Reusable build configuration
x-common-build: &common-build
  context: .
  dockerfile: Containerfile
  args:
    VERSION: ${VEXILON_VERSION:-dev}

# Standard service boilerplate: Resource limits and Persistence
x-service-defaults: &service-defaults
  mem_limit: *MEM_LIMIT
  memswap_limit: *MEM_LIMIT
  volumes:
    - pdf_cache:/app/.pdf_cache

# Development volumes: Enables live-reload while protecting internal container data
x-dev-volumes: &dev-volumes
  - .:/app:z
  - pdf_cache:/app/.pdf_cache
  - ./reports:/app/reports:z  # Artifact extraction "Lifeboat"
  - /app/.venv         # Lifeboat for packages
  - /app/hf_cache      # Lifeboat for the model
  - /app/.pytest_cache # Lifeboat for test metadata

services:

  # ── Vexilon app ───────────────────────────────────────────────────────────────
  # Production-ready entry point gated by integration tests.
  # Uses code baked into the image for maximum performance/reliability.
  vexilon:
    <<: *service-defaults
    profiles: [prod]
    build: *common-build
    environment:
      <<: *common-env
      VEXILON_USERNAME: ${VEXILON_USERNAME:-admin}
      VEXILON_PASSWORD: ${VEXILON_PASSWORD:-}
      PORT: *PORT
    ports: ["7860:7860"]
    cap_drop: [ALL]
    tmpfs: [/tmp]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://localhost:' + os.getenv('PORT', '7860'))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s # Match the slow model loading period

  # ── Testing ──────────────────────────────────────────────────────────────────
  # Mounts source code to allow testing local changes without a rebuild.
  tests:
    <<: *service-defaults
    profiles: [test]
    build:
      <<: *common-build
      target: test_builder

    volumes: *dev-volumes # Overrides x-service-defaults
    environment: *common-env
    command: >
      sh -c "uv run --no-sync python -m pytest tests/test_*.py tests/integration/ -v 
      --junitxml=reports/junit.xml 
      --cov=vexilon --cov=app --cov-report=xml:reports/coverage.xml"
    depends_on:
      index-refresh:
        condition: service_completed_successfully

  # ── Cache Refresh ────────────────────────────────────────────────────────────
  # Runs the indexing script against the baked-in code.
  index-refresh:
    <<: *service-defaults
    profiles: [tools]
    build:
      <<: *common-build
      target: builder
    environment: *common-env
    command: python scripts/build_index.py

  # ── Fast Development ───────────────────────────────────────────────────
  # Builds from source with live reload and polling enabled for Podman.
  watch:
    <<: *service-defaults
    extends: vexilon
    build:
      <<: *common-build
      target: test_builder
    profiles: ["dev"]
    volumes: *dev-volumes
    environment:
      <<: *common-env
      WATCHFILES_FORCE_POLLING: "true"
      VEXILON_LLM_PROVIDER: ${VEXILON_LLM_PROVIDER:-ollama}
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    command: uv run --no-sync gradio app.py --watch-dirs .

  # ── Cache Validator ─────────────────────────────────────────────────────────
  # Ensures the FAISS cache is in sync with the source data.
  cache-validator:
    <<: *service-defaults
    profiles: [tools]
    build:
      <<: *common-build
      target: test_builder
    volumes: *dev-volumes
    environment: *common-env
    command: uv run --no-sync python scripts/generate_cache_manifest.py validate

  # ── Local LLM (Ollama) ──────────────────────────────────────────────────────
  # Provides an OpenAI-compatible API for local model execution.
  ollama:
    image: ollama/ollama:latest
    profiles: ["dev", "ollama"]
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-time service to pull the required model into the ollama volume.
  ollama-init:
    image: curlimages/curl:latest
    profiles: ["dev", "ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    command: >
      sh -c "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"${OLLAMA_MODEL:-qwen2.5:7b}\"}'"

volumes:
  pdf_cache: {}
  ollama_data: {}
