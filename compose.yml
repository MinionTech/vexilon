services:

  # ── Vexilon app ───────────────────────────────────────────────────────────────
  vexilon:
    build:
      context: .
      dockerfile: Containerfile
    container_name: vexilon
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      PORT: "7860"
    ports:
      - "7860:7860"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp                  # Writable tmp for Gradio and other runtime files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ── Live reload for local development ─────────────────────────────────────
    # Usage: docker compose watch  (or: podman-compose watch)
    # Syncs app.py edits instantly; rebuilds the image only when deps change.
    develop:
      watch:
        - action: sync
          path: ./app.py
          target: /app/app.py
        - action: rebuild
          path: requirements.txt
        - action: rebuild
          path: Containerfile
