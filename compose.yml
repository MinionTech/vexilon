# ── Reusable Variables ───────────────────────────────────────────────────────
x-var:
  - &PORT "7860"
  - &MEM_LIMIT 6g

# Reusable environment for all services
x-common-env: &common-env
  HF_TOKEN: ${HF_TOKEN:-}
  GRADIO_ANALYTICS_ENABLED: "False"

x-common-build: &common-build
  context: .
  dockerfile: Containerfile
  args:
    VERSION: ${AGNAV_VERSION:-dev}

# Standard service boilerplate: Resource limits and Persistence
x-service-defaults: &service-defaults
  mem_limit: *MEM_LIMIT
  memswap_limit: *MEM_LIMIT
  volumes: []

# Development volumes: Enables live-reload while protecting internal container data
x-dev-volumes: &dev-volumes
  - .:/app:z
  - ./reports:/app/reports:z  # Artifact extraction "Lifeboat"
  - /app/.venv         # Lifeboat for packages
  - /hf_cache      # Lifeboat for the model
  - /app/.pytest_cache # Lifeboat for test metadata

services:

  # ── dev (Local Development with Hot-Reload) ──────────────────────────────────
  # Mounts source code to allow instant feedback.
  dev:
    <<: *service-defaults
    user: "${UID:-1000}:${GID:-1000}"
    profiles: [dev]
    build:
      <<: *common-build
      target: test_builder
    volumes: *dev-volumes
    environment:
      <<: *common-env
      WATCHFILES_FORCE_POLLING: "true"
      PORT: *PORT
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "${PORT:-7860}:7860"
    command: /app/.venv/bin/python app.py
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:7860')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Staging Simulation (Immutable Cloud-Parity) ───────────────────────────
  # Run with: podman compose --profile staging up staging
  staging:
    <<: *service-defaults
    profiles: [staging]
    build: *common-build
    environment:
      <<: *common-env
      AGNAV_LLM_PROVIDER: huggingface
      PORT: *PORT
    ports:
      - "${PORT:-7860}:7860"
    cap_drop: [ALL]
    tmpfs: [/tmp]

  # ── test (Containerized Unit Tests) ──────────────────────────────────────────
  test:
    <<: *service-defaults
    user: "${UID:-1000}:${GID:-1000}"
    profiles: [test]
    build:
      <<: *common-build
      target: test_builder
    volumes: *dev-volumes
    environment:
      <<: *common-env
      AGNAV_FORCE_PERSPECTIVES: "true"
    command: >
      sh -c "VERIFY_ENABLED=true uv run --no-sync python -m pytest tests/test_*.py -v 
      --junitxml=reports/junit.xml 
      --cov=agnav --cov=app --cov-report=xml:reports/coverage.xml"

  # ── verify (Cache Validator) ──────────────────────────────────────────────────
  verify:
    <<: *service-defaults
    profiles: [verify]
    build:
      <<: *common-build
      target: test_builder
    environment: *common-env
    command: /app/.venv/bin/python scripts/generate_cache_manifest.py validate

  # ── Local LLM (Ollama) ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: [dev, e2e]
    ports: ["11434:11434"]
    environment:
      - OLLAMA_FLASH_ATTENTION=1
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-time service to pull the required model into the ollama volume.
  ollama-init:
    image: ollama/ollama:latest
    profiles: [dev, e2e]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./app.py:/app/app.py:ro
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    command: 
      - -c
      - |
        TARGET_MODEL=$$(sed -n 's/.*OLLAMA_MODEL_ID = "\(.*\)".*/\1/p' /app/app.py)
        echo "Determined target model from app.py: $$TARGET_MODEL"
        ollama pull $$TARGET_MODEL

  # ── e2e (Functional / Integration / E2E Tests) ──────────────────────────────
  e2e:
    <<: *service-defaults
    user: "${UID:-1000}:${GID:-1000}"
    profiles: [e2e]
    build:
      <<: *common-build
      target: functional_builder
    volumes: []
    environment:
      <<: *common-env
      PYTHONPATH: /app
      AGNAV_LLM_PROVIDER: ollama
      OLLAMA_HOST: ollama
      OLLAMA_MODEL: qwen3:0.6b  # Tiny model for fast CI
      AGNAV_FORCE_PERSPECTIVES: "true"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    command: /app/scripts/integration_e2e.sh

  # ── audit (Security & Dependency Scanning) ──────────────────────────────────
  audit:
    image: aquasec/trivy:latest
    profiles: [audit]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app:z
    command: config /app

volumes:
  ollama_data: {}
