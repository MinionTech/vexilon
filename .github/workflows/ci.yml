name: Analysis & CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'screenshots/**'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'screenshots/**'

permissions:
  packages: write
  contents: read

env:
  HF_HOME: /home/runner/.cache/huggingface
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  tests:
    name: Unit Tests
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Cache HuggingFace model
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv sync && uv run pytest tests/ -v

  build-image:
    name: Build & Smoke Test
    if: ${{ github.event_name == 'pull_request' && ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      IMAGE_TAG: pr-${{ github.event.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          podman build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -f Containerfile .

      - name: Container Smoke Test
        run: |
          podman run -d --rm -p 7860:7860 --name vexilon-app -e ANTHROPIC_API_KEY=sk-ant-test123 ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
          echo "Waiting for healthcheck..."
          for i in {1..30}; do
            if curl -f http://localhost:7860 > /dev/null 2>&1; then
              echo "Container is healthy!"
              podman stop vexilon-app
              exit 0
            fi
            
            if ! podman inspect vexilon-app --format '{{.State.Running}}' 2>/dev/null | grep -q 'true'; then
              echo "Container died unexpectedly! Dumping logs..."
              podman logs vexilon-app
              exit 1
            fi
            sleep 2
          done
          echo "Healthcheck timed out."
          podman stop vexilon-app
          exit 1

      - name: Push to GHCR
        run: |
          podman push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
