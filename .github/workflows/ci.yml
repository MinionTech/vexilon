name: Pull Request CI

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'app.py'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'pdf_cache/**'

permissions:
  contents: read
  packages: write

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Preview
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:pr-${{ github.event.number }}
            ghcr.io/${{ github.repository }}:sha-${{ github.event.pull_request.head.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.description=Vexilon Preview Image (PR #${{ github.event.number }})
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
            bcgov.vexilon.trust_domain=0
