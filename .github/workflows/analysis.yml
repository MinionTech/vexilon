name: Analysis

# Runs unit tests on pull requests (excluding drafts) and on every push to main.
# Smoke tests (tests/smoke/) are excluded — they require a real ANTHROPIC_API_KEY.
#
# This workflow is the required gate for Renovate dependency PRs.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  schedule:
    - cron: "0 11 * * 0" # 3 AM PST = 11 AM UTC, runs Sundays

permissions: {}

jobs:
  tests:
    name: Unit Tests
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read

    # Override the /tmp/hf_cache default from app.py so actions/cache can persist it.
    env:
      HF_HOME: /home/runner/.cache/huggingface

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Cache HuggingFace model
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/huggingface
          # Bust the cache when dependencies change (new model version, etc.)
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Validate requirements.txt resolves against public indexes
        # Proves every pinned version in requirements.txt actually exists on PyPI
        # and the PyTorch CPU wheel index. --dry-run resolves without downloading.
        run: pip install --dry-run -r requirements.txt

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          # Smoke tests (tests/smoke/) skip gracefully when this is absent (fork PRs, etc.).
          # Same-repo PRs (Renovate, feature branches) get the secret and run them.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run pytest tests/ -v

  container_build:
    name: Build & Push to GHCR
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long
            type=ref,event=pr

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=sha-${{ github.sha }}

      - name: Output Status
        run: echo "Build successful for ${{ github.repository }} (Digest ${{ steps.build.outputs.digest }})"

  container_test:
    name: Container Smoke Test
    needs: container_build
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Pull and Start Container
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
          podman pull $IMAGE
          podman run -d --rm -p 7860:7860 --name vexilon-app -e ANTHROPIC_API_KEY=sk-ant-test123 $IMAGE

      - name: Wait for Healthcheck
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:7860 > /dev/null 2>&1; then
              echo "Container is healthy!"
              exit 0
            fi
            
            if ! podman inspect vexilon-app --format '{{.State.Running}}' 2>/dev/null | grep -q 'true'; then
              echo "Container died! Logs:"
              podman logs vexilon-app
              exit 1
            fi

            echo "Wait... ($i/30)"
            sleep 2
          done
          echo "Healthcheck timed out."
          exit 1

      - name: Dump Logs on Failure
        if: failure()
        run: podman logs vexilon-app
