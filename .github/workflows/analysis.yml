name: Analysis

# Runs unit tests on pull requests (excluding drafts) and on every push to main.
# Smoke tests (tests/smoke/) are excluded — they require a real ANTHROPIC_API_KEY.
#
# This workflow is the required gate for Renovate dependency PRs.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  schedule:
    - cron: "0 11 * * 0" # 3 AM PST = 11 AM UTC, runs Sundays

permissions: {}

jobs:
  tests:
    name: Unit Tests
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read

    # Override the /tmp/hf_cache default from app.py so actions/cache can persist it.
    env:
      HF_HOME: /home/runner/.cache/huggingface

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Cache HuggingFace model
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/huggingface
          # Bust the cache when dependencies change (new model version, etc.)
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Validate requirements.txt resolves against public indexes
        # Proves every pinned version in requirements.txt actually exists on PyPI
        # and the PyTorch CPU wheel index. --dry-run resolves without downloading.
        run: pip install --dry-run -r requirements.txt

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          # Smoke tests (tests/smoke/) skip gracefully when this is absent (fork PRs, etc.).
          # Same-repo PRs (Renovate, feature branches) get the secret and run them.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run pytest tests/ -v

  container_test:
    name: Container Smoke Test
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and Start Container
        # Injecting a fake ANTHROPIC_API_KEY so the container doesn't fail immediately on startup.
        # This proves the UI boots and binds to port 7860 without dependency collisions.
        run: |
          podman build -t vexilon-test -f Containerfile .
          podman run -d --rm -p 7860:7860 --name vexilon-app -e ANTHROPIC_API_KEY=sk-ant-test123 vexilon-test

      - name: Wait for Healthcheck
        # Retry curl against the Gradio UI port. The healthcheck timeout is 60s.
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:7860 > /dev/null 2>&1; then
              echo "Container is healthy!"
              exit 0
            fi
            
            # Check if container is still running. If it crashed (e.g. missing config), fail now.
            if ! podman inspect vexilon-app --format '{{.State.Running}}' 2>/dev/null | grep -q 'true'; then
              echo "Container died unexpectedly! Dumping logs..."
              podman logs vexilon-app
              exit 1
            fi

            echo "Waiting for container ($i/30)..."
            sleep 2
          done
          echo "Healthcheck timed out."
          exit 1

      - name: Dump Container Logs on Failure
        if: failure()
        run: podman logs vexilon-app
