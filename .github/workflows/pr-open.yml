name: PR Open

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  tests:
    name: Unit & Integration Tests (Host)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b #8.1.0

      - name: Install System Dependencies (for Pillow source build)
        run: |
          sudo apt-get update && sudo apt-get install -y libjpeg-dev zlib1g-dev

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Run Tests
        run: |
          export VERIFY_ENABLED=true
          uv run python -m pytest tests/test_*.py -v \
            --junitxml=reports/junit.xml \
            --cov=agnav --cov=app --cov-report=xml:reports/coverage.xml

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/

  container_test:
    name: Container Smoke Test (Stage-Based)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start Podman Socket
        run: systemctl --user start podman.socket

      - name: Run Functional Integration and E2E Tests
        run: |
          podman compose --profile ci up --build --abort-on-container-exit functional-tests

      - name: Dump Logs on Failure
        if: failure()
        run: podman compose --profile ci logs

      - name: Cleanup
        if: always()
        run: podman compose --profile ci down -v || true

  trivy:
    name: Trivy Security Scan
    needs: [tests]
    permissions:
      security-events: write
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
