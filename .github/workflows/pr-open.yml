name: PR Open

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: Check Triggers
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: read
    outputs:
      triggered: ${{ steps.diff.outputs.triggered }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - id: diff
        uses: bcgov/actions/diff-triggers@main
        with:
          triggers: '["./Containerfile", "./pyproject.toml", "./app.py", "./agnav/", "./scripts/", "./prompts/", "./data/", "./tests/", "./.github/workflows/"]'

  prepare-tests:
    name: Prepare Test Cache
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Warm Cache (All Test Targets)
        uses: docker/bake-action@v7
        with:
          files: compose.yml
          targets: test-unit,test-integration,test-e2e
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  test-unit:
    name: Unit Tests
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Unit Tests)
        uses: docker/bake-action@v7
        with:
          load: true
          files: compose.yml
          targets: test-unit
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Run Containerized Unit Tests
        run: |
          mkdir -p reports
          docker compose --profile test up --build --abort-on-container-exit test-unit

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose --profile test logs test-unit

      - name: Upload Coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: reports/

  validate-cache:
    name: Validate FAISS Cache
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Validator)
        uses: docker/bake-action@v7
        with:
          load: true
          files: compose.yml
          targets: verify
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Validate Cache Manifest
        run: docker compose --profile verify up --build verify

  test-integration:
    name: RAG Integration Tests
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Integration)
        uses: docker/bake-action@v7
        with:
          load: true
          files: compose.yml
          targets: test-integration
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Run Integration Tests
        run: docker compose --profile integration up --build --abort-on-container-exit test-integration

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose --profile integration logs

      - name: Cleanup
        if: always()
        run: docker compose --profile integration down -v || true

  test-e2e:
    name: E2E Tests (Smoke)
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Functional Tests)
        uses: docker/bake-action@v7
        with:
          load: true
          files: compose.yml
          targets: test-e2e
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Run E2E Smoke Test
        run: docker compose --profile e2e up --build --abort-on-container-exit test-e2e

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose --profile ci logs

      - name: Cleanup
        if: always()
        run: docker compose --profile ci down -v || true

  build:
    name: Build & Push to GHCR
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      triggered: ${{ steps.builder.outputs.triggered }}
    steps:
      - name: Build and Push
        id: builder
        uses: bcgov/action-builder-ghcr@main
        with:
          package: agnav
          build_context: .
          build_file: Containerfile
          build_args: |
            VERSION=sha-${{ github.event.pull_request.head.sha }}
            REPO_URL=https://github.com/${{ github.repository }}

  trivy:
    name: Trivy Security Scan
    needs: [test-unit, prepare-tests]
    continue-on-error: true
    runs-on: ubuntu-slim
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  results:
    name: Results
    needs: [build, test-integration, test-e2e, validate-cache, trivy]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'canceled')
        run: |
          echo "At least one required job has failed or was canceled."
          exit 1
      - run: echo "All critical checks passed or were intentionally skipped."
