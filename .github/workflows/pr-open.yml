name: PR Open

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

env:
  OLLAMA_MODEL_ID: tinyllama
  OLLAMA_DATA_PATH: ./.ollama_data

jobs:
  check:
    name: Check Triggers
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: read
    outputs:
      triggered: ${{ steps.diff.outputs.triggered }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - id: diff
        uses: bcgov/actions/diff-triggers@main
        with:
          triggers: '["app/**", "compose.yml", ".github/workflows/**"]'

  prepare-tests:
    name: Prepare Test Cache
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Cache Ollama Models
        uses: actions/cache@v5
        with:
          path: ./.ollama_data
          key: ollama-models-${{ env.OLLAMA_MODEL_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Warm Cache (All Test Targets)
        uses: docker/bake-action@v7
        with:
          files: compose.yml
          targets: dev,staging
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache
            *.cache-to=type=gha,mode=max

  test-unit:
    name: Unit Tests
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Unit Tests)
        uses: docker/bake-action@v7
        with:
          load: true
          files: compose.yml
          targets: test-unit
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache
            *.cache-to=type=gha,mode=max

      - name: Run Containerized Unit Tests
        run: |
          mkdir -p reports
          docker compose up --abort-on-container-exit test-unit

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose logs test-unit

      - name: Upload Coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: reports/

  validate-cache:
    name: Validate FAISS Cache
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Validator)
        uses: docker/bake-action@v7
        with:
          load: true
          files: compose.yml
          targets: dev
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache
            *.cache-to=type=gha,mode=max

      - name: Validate Cache Manifest
        run: docker compose up test-cache

  test-integration-model:
    name: Integration Tests (Model)
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Ollama Models
        uses: actions/cache@v5
        with:
          path: ./.ollama_data
          key: ollama-models-${{ env.OLLAMA_MODEL_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Integration)
        uses: docker/bake-action@v7
        with:
          load: true
          files: compose.yml
          targets: dev
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache
            *.cache-to=type=gha,mode=max

      - name: Run Integration Tests
        run: docker compose up test-integration-model

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v || true

  test-integration-app:
    name: Integration Tests (App)
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Functional Tests)
        uses: docker/bake-action@v7
        with:
          load: true
          files: compose.yml
          targets: dev
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache
            *.cache-to=type=gha,mode=max

      - name: Run Integration Tests (App)
        run: docker compose up test-integration-app

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v || true

  test-e2e:
    name: End-to-End Tests
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Ollama Models
        uses: actions/cache@v5
        with:
          path: ./.ollama_data
          key: ollama-models-${{ env.OLLAMA_MODEL_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (E2E)
        uses: docker/bake-action@v7
        with:
          load: true
          files: compose.yml
          targets: dev,staging
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache
            *.cache-to=type=gha,mode=max

      - name: Run E2E Tests
        run: docker compose up test-everything

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v || true

  build:
    name: Build & Push to GHCR
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      triggered: ${{ steps.builder.outputs.triggered }}
    steps:
      - name: Build and Push
        id: builder
        uses: bcgov/action-builder-ghcr@main
        with:
          package: agnav
          build_context: app
          build_file: app/Containerfile
          build_args: |
            VERSION=sha-${{ github.event.pull_request.head.sha }}
            REPO_URL=https://github.com/${{ github.repository }}

  trivy:
    name: Trivy Security Scan
    needs: [test-unit, prepare-tests]
    continue-on-error: true
    runs-on: ubuntu-slim
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  results:
    name: Results
    needs: [build, test-integration-model, test-integration-app, test-e2e, validate-cache, trivy]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'canceled')
        run: |
          echo "At least one required job has failed or was canceled."
          exit 1
      - run: echo "All critical checks passed or were intentionally skipped."
