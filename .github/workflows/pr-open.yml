name: PR Open

# Runs unit tests on pull requests (excluding drafts) and on the weekly schedule.
# Images are built during PRs and promoted on merge — no rebuild on main.
# Smoke tests (tests/smoke/) are excluded — they require a real ANTHROPIC_API_KEY.
#
# This workflow is the required gate for Renovate dependency PRs.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: Check Triggers
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-24.04
    outputs:
      triggered: ${{ steps.diff.outputs.triggered }}
    steps:
      - uses: actions/checkout@v6
      - id: diff
        uses: bcgov/actions/diff-triggers@main
        with:
          triggers: '["./Containerfile", "./pyproject.toml", "./app.py", "./vexilon/", "./scripts/", "./prompts/", "./data/", "./tests/"]'

  unit_tests:
    name: Unit Tests
    needs: [check]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Unit Tests
        run: uv run pytest tests/ -v --ignore=tests/integration/ --ignore=tests/smoke/

  integration_tests:
    name: Integration Tests
    needs: [check, unit_tests]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      HF_HOME: /home/runner/.cache/huggingface
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Cache HuggingFace model
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Integration Tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run pytest tests/integration/ -v

  container_build:
    name: Build & Push to GHCR
    needs: [check, unit_tests]
    if: needs.check.outputs.triggered == 'true'
    env:
      IMAGE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      triggered: ${{ steps.builder.outputs.triggered }}

    steps:
      - name: Build and Push
        id: builder
        uses: bcgov/action-builder-ghcr@main
        with:
          package: vexilon
          build_context: .
          build_file: Containerfile
          tags: sha-${{ env.IMAGE_SHA }}
          build_args: VERSION=sha-${{ env.IMAGE_SHA }}

  container_test:
    name: Container Smoke Test
    needs: container_build
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Pull and Start Container
        env:
          # Resolve the real PR head commit SHA independently — validates the SHA pattern
          IMAGE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          declare -l IMAGE="ghcr.io/${{ github.repository }}:sha-${IMAGE_SHA}"
          podman pull $IMAGE
          podman run -d -p 7860:7860 --name vexilon-${{ github.event.pull_request.number || github.run_id }} -e ANTHROPIC_API_KEY=sk-ant-test123 $IMAGE

      - name: Wait for Healthcheck
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:7860 > /dev/null 2>&1; then
              echo "Container is healthy!"
              exit 0
            fi
            
            if ! podman inspect vexilon-${{ github.event.pull_request.number || github.run_id }} --format '{{.State.Running}}' 2>/dev/null | grep -q 'true'; then
              echo "Container died! Logs:"
              podman logs vexilon-${{ github.event.pull_request.number || github.run_id }}
              exit 1
            fi

            echo "Wait... ($i/30)"
            sleep 2
          done
          echo "Healthcheck timed out."
          exit 1

      - name: Dump Logs on Failure
        if: failure()
        run: podman logs vexilon-${{ github.event.pull_request.number || github.run_id }}

      - name: Cleanup Container
        if: always()
        run: |
          podman stop vexilon-${{ github.event.pull_request.number || github.run_id }} || true
          podman rm vexilon-${{ github.event.pull_request.number || github.run_id }} || true

  trivy:
    name: Trivy Security Scan
    needs: [check, unit_tests]
    if: needs.check.outputs.triggered == 'true'
    permissions:
      security-events: write
    runs-on: ubuntu-slim
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  results:
    name: Results
    needs: [unit_tests, integration_tests, container_build, container_test, trivy]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure')||contains(needs.*.result, 'canceled')
        run: echo "At least one job has failed." && exit 1
      - run: echo "Success!"
