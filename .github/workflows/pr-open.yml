name: PR Open

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: Check Triggers
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      triggered: ${{ steps.diff.outputs.triggered }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - id: diff
        uses: bcgov/actions/diff-triggers@main
        with:
          triggers: '["./Containerfile", "./pyproject.toml", "./app.py", "./agnav/", "./scripts/", "./prompts/", "./data/", "./tests/", "./.github/workflows/"]'

  cache_validation:
    name: Validate FAISS Cache
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Start Podman Socket
        run: systemctl --user start podman.socket

      - name: Validate Cache Manifest
        run: podman compose run --rm cache-validator

  tests:
    name: Unit & Integration Tests (Host)
    needs: cache_validation
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b #8.1.0

      - name: Install System Dependencies (for Pillow source build)
        run: |
          sudo apt-get update && sudo apt-get install -y libjpeg-dev zlib1g-dev

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Run Tests
        run: |
          export VERIFY_ENABLED=true
          uv run python -m pytest tests/test_*.py -v \
            --junitxml=reports/junit.xml \
            --cov=agnav --cov=app --cov-report=xml:reports/coverage.xml

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/

  smoke-test:
    name: Container Smoke Test (Stage-Based)
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start Podman Socket
        run: systemctl --user start podman.socket

      - name: Run Functional Integration and E2E Tests
        run: podman compose --profile ci up --build --abort-on-container-exit functional-tests

      - name: Dump Logs on Failure
        if: failure()
        run: podman compose --profile ci logs

      - name: Cleanup
        if: always()
        run: podman compose --profile ci down -v || true

  trivy:
    name: Trivy Security Scan
    needs: [check, tests]
    if: needs.check.outputs.triggered == 'true'
    continue-on-error: true
    runs-on: ubuntu-slim
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  results:
    name: Results
    needs: [tests, smoke-test, trivy]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'canceled')
        run: |
          echo "At least one required job has failed or was canceled."
          exit 1
      - run: echo "All critical checks passed or were intentionally skipped."
