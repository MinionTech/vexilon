name: PR Open

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: Check Trigger
    runs-on: ubuntu-latest
    outputs:
      triggered: ${{ steps.check.outputs.triggered }}
    steps:
      - name: Check for [skip ci]
        id: check
        run: |
          if [[ "${{ github.event.pull_request.title }}" == *"[skip ci]"* ]]; then
            echo "triggered=false" >> $GITHUB_OUTPUT
          else
            echo "triggered=true" >> $GITHUB_OUTPUT
          fi

  tests:
    name: Unit & Integration Tests (Host)
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install UV
        uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Run Tests
        run: |
          export VERIFY_ENABLED=true
          uv run python -m pytest tests/test_*.py tests/integration/ -v \
            --junitxml=reports/junit.xml \
            --cov=agnav --cov=app --cov-report=xml:reports/coverage.xml

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/

  container_test:
    name: Container Smoke Test (Stage-Based)
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start Podman Socket
        run: systemctl --user start podman.socket

      - name: Run Functional Integration and E2E Tests
        run: |
          podman compose --profile ci up --build --abort-on-container-exit functional-tests

      - name: Dump Logs on Failure
        if: failure()
        run: podman compose --profile ci logs

      - name: Cleanup
        if: always()
        run: podman compose --profile ci down -v || true

  trivy:
    name: Trivy Security Scan
    needs: [check, tests]
    if: needs.check.outputs.triggered == 'true'
    permissions:
      security-events: write
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
