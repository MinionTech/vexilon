name: PR Open

# Runs unit tests on pull requests (excluding drafts) and on the weekly schedule.
# Images are built during PRs and promoted on merge — no rebuild on main.
# Container Smoke Tests (including real E2E queries) are run on every build.
#
# This workflow is the required gate for Renovate dependency PRs.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: Check Triggers
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-24.04
    outputs:
      triggered: ${{ steps.diff.outputs.triggered }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - id: diff
        uses: bcgov/actions/diff-triggers@main
        with:
          triggers: '["./Containerfile", "./pyproject.toml", "./app.py", "./agnav/", "./scripts/", "./prompts/", "./data/", "./tests/", "./.github/workflows/"]'

  cache_validation:
    name: Validate FAISS Cache
    needs: [check, compose_validation]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Start Podman Socket
        run: systemctl --user start podman.socket
      - name: Validate Cache Manifest
        run: podman compose run --rm cache-validator

  compose_validation:
    name: Compose Validation
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Start Podman Socket
        run: systemctl --user start podman.socket
      - name: Validate Compose File
        run: podman compose config

  tests:
    name: Tests and Analysis
    needs: [check, cache_validation, compose_validation]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Start Podman Socket
        run: systemctl --user start podman.socket

      - name: Run Tests and Analysis
        uses: bcgov/action-test-and-analyse@main
        with:
          language: python
          python_version: "3.14"
          dir: .
          # Consistent test execution via podman-compose
          commands: |
            export HF_TOKEN=${{ secrets.HF_TOKEN }}
            mkdir -p reports
            podman compose run --rm tests
          triggers: '["./Containerfile", "./pyproject.toml", "./app.py", "./agnav/", "./scripts/", "./prompts/", "./data/", "./tests/", "./.github/workflows/"]'
          sonar_token: ${{ secrets.SONAR_TOKEN }}

      - name: Upload Test and Security Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agnav-reports
          path: reports/

  container_build:
    name: Build & Push to GHCR
    needs: [check, tests]
    if: needs.check.outputs.triggered == 'true'
    env:
      IMAGE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      triggered: ${{ steps.builder.outputs.triggered }}

    steps:
      - name: Build and Push
        id: builder
        uses: bcgov/action-builder-ghcr@main
        with:
          package: agnav
          build_context: .
          build_file: Containerfile
          tags: sha-${{ env.IMAGE_SHA }}
          build_args: |
            VERSION=sha-${{ env.IMAGE_SHA }}
            REPO_URL=https://github.com/${{ github.repository }}

  container_test:
    name: Heavy Tests (Container)
    needs: container_build
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start Podman Socket
        run: systemctl --user start podman.socket

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Heavy Integration & Smoke Stack
        env:
          IMAGE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Build the venv on host to share with the container via volume
          # This ensures the container has dev deps (pytest) without modifying the image.
          uv sync --frozen
          
          # 2. Pull the production build artifact
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          export IMAGE="ghcr.io/${OWNER,,}/${REPO,,}/agnav:sha-${IMAGE_SHA}"
          podman pull $IMAGE
          
          # 3. Mount host's .venv and tests into the prod container
          cat <<EOF > compose.override.yml
          services:
            heavy-tests:
              image: $IMAGE
              build: null
              volumes:
                - ./.venv:/app/.venv:z
                - ./tests:/app/tests:z
          EOF
          
          podman compose --profile ci up --exit-code-from heavy-tests heavy-tests

      - name: Dump Logs on Failure
        if: failure()
        run: podman compose --profile ci logs

      - name: Cleanup
        if: always()
        run: podman compose --profile ci down -v || true

  trivy:
    name: Trivy Security Scan
    needs: [check, tests]
    if: needs.check.outputs.triggered == 'true'
    permissions:
      security-events: write
    runs-on: ubuntu-slim
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  semgrep:
    name: Semgrep Security Scan
    needs: [check]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/secrets
            p/owasp-top-10
          generateSarif: "1"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  results:
    name: Results
    needs: [check, tests, container_build, container_test, trivy, semgrep]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'canceled')
        run: |
          echo "At least one required job has failed or was canceled."
          exit 1
      - run: echo "All critical checks passed or were intentionally skipped."
