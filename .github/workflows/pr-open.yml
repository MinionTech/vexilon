name: PR Open

# Runs unit tests on pull requests (excluding drafts) and on the weekly schedule.
# Images are built during PRs and promoted on merge — no rebuild on main.
# Smoke tests (tests/smoke/) are excluded — they require a real ANTHROPIC_API_KEY.
#
# This workflow is the required gate for Renovate dependency PRs.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: Check Triggers
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-24.04
    outputs:
      triggered: ${{ steps.diff.outputs.triggered }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - id: diff
        uses: bcgov/actions/diff-triggers@main
        with:
          triggers: '["./Containerfile", "./pyproject.toml", "./app.py", "./vexilon/", "./scripts/", "./prompts/", "./data/", "./tests/", "./.github/workflows/"]'

  cache_validation:
    name: Validate FAISS Cache
    needs: [check]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Validate Cache Manifest
        run: |
          echo "Validating FAISS cache against source files..."
          if ! uv run scripts/generate_cache_manifest.py validate; then
            echo ""
            echo "ERROR: Cache is out of sync with data/labour_law/ directory."
            echo "Run 'python scripts/generate_cache_manifest.py' to regenerate."
            exit 1
          fi

  compose_validation:
    name: Compose Validation
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate Compose File
        run: podman compose config

  tests:
    name: Tests and Analysis
    needs: [check, cache_validation, compose_validation]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Run Tests and Analysis
        uses: bcgov/action-test-and-analyse@main
        with:
          language: python
          python_version: "3.14"
          dir: .
          # Consistent test execution via podman-compose
          commands: |
            export ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY || 'sk-dummy-key-for-predictability' }}
            podman compose run --rm tests
          triggers: '["./Containerfile", "./pyproject.toml", "./app.py", "./vexilon/", "./scripts/", "./prompts/", "./data/", "./tests/", "./.github/workflows/"]'
          sonar_token: ${{ secrets.SONAR_TOKEN }}

  container_build:
    name: Build & Push to GHCR
    needs: [check, tests]
    if: needs.check.outputs.triggered == 'true'
    env:
      IMAGE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      triggered: ${{ steps.builder.outputs.triggered }}

    steps:
      - name: Build and Push
        id: builder
        uses: bcgov/action-builder-ghcr@main
        with:
          package: vexilon
          build_context: .
          build_file: Containerfile
          tags: sha-${{ env.IMAGE_SHA }}
          build_args: VERSION=sha-${{ env.IMAGE_SHA }}

  container_test:
    name: Container Smoke Test
    needs: container_build
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Pull and Start Container
        env:
          # Resolve the real PR head commit SHA independently — validates the SHA pattern
          IMAGE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          declare -l IMAGE="ghcr.io/${{ github.repository }}:sha-${IMAGE_SHA}"
          podman pull $IMAGE
          podman run -d -p 7860:7860 --name vexilon-${{ github.event.pull_request.number || github.run_id }} -e ANTHROPIC_API_KEY=sk-ant-test123 $IMAGE

      - name: Wait for Healthcheck
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:7860 > /dev/null 2>&1; then
              echo "Container is healthy!"
              exit 0
            fi
            
            if ! podman inspect vexilon-${{ github.event.pull_request.number || github.run_id }} --format '{{.State.Running}}' 2>/dev/null | grep -q 'true'; then
              echo "Container died! Logs:"
              podman logs vexilon-${{ github.event.pull_request.number || github.run_id }}
              exit 1
            fi

            echo "Wait... ($i/30)"
            sleep 2
          done
          echo "Healthcheck timed out."
          exit 1

      - name: Dump Logs on Failure
        if: failure()
        run: podman logs vexilon-${{ github.event.pull_request.number || github.run_id }}

      - name: Cleanup Container
        if: always()
        run: |
          podman stop vexilon-${{ github.event.pull_request.number || github.run_id }} || true
          podman rm vexilon-${{ github.event.pull_request.number || github.run_id }} || true

  trivy:
    name: Trivy Security Scan
    needs: [check, tests]
    if: needs.check.outputs.triggered == 'true'
    permissions:
      security-events: write
    runs-on: ubuntu-slim
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  results:
    name: Results
    needs: [check, tests, container_build, container_test]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'canceled')
        run: |
          echo "At least one required job has failed or was canceled."
          exit 1
      - run: echo "All critical checks passed or were intentionally skipped."
