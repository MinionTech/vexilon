name: PR Open

# Runs unit tests on pull requests (excluding drafts) and on the weekly schedule.
# Images are built during PRs and promoted on merge — no rebuild on main.
# Smoke tests (tests/smoke/) are excluded — they require a real ANTHROPIC_API_KEY.
#
# This workflow is the required gate for Renovate dependency PRs.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '**.md'
      - '!data/**'
      - 'LICENSE'
      - 'renovate.json'
      - '.*'
      - '.*/**'
      - '!.github/workflows/pr-open.yml'
      - '!.dockerignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  unit_tests:
    name: Unit Tests
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Unit Tests
        run: uv run pytest tests/ -v --ignore=tests/integration/ --ignore=tests/smoke/

  integration_tests:
    name: Integration Tests
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      HF_HOME: /home/runner/.cache/huggingface
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Cache HuggingFace model
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - name: Install dependencies
        run: uv sync
      - name: Run Integration Tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run pytest tests/integration/ -v

  container_build:
    name: Build & Push to GHCR
    needs: [unit_tests, integration_tests]
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve commit SHA
        id: sha
        run: |
          # Use the real PR head commit, not the synthetic test-merge commit
          echo "commit=${{ github.event.pull_request.head.sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=sha-${{ steps.sha.outputs.commit }}
            type=ref,event=pr

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=sha-${{ steps.sha.outputs.commit }}

      - name: Output Status
        run: echo "Build successful for ${{ github.repository }} (Digest ${{ steps.build.outputs.digest }})"

  container_test:
    name: Container Smoke Test
    needs: container_build
    if: ${{ ! github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Pull and Start Container
        env:
          # Resolve the real PR head commit SHA independently — validates the SHA pattern
          IMAGE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          declare -l IMAGE="ghcr.io/${{ github.repository }}:sha-${IMAGE_SHA}"
          podman pull $IMAGE
          podman run -d --rm -p 7860:7860 --name vexilon-app -e ANTHROPIC_API_KEY=sk-ant-test123 $IMAGE

      - name: Wait for Healthcheck
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:7860 > /dev/null 2>&1; then
              echo "Container is healthy!"
              exit 0
            fi
            
            if ! podman inspect vexilon-app --format '{{.State.Running}}' 2>/dev/null | grep -q 'true'; then
              echo "Container died! Logs:"
              podman logs vexilon-app
              exit 1
            fi

            echo "Wait... ($i/30)"
            sleep 2
          done
          echo "Healthcheck timed out."
          exit 1

      - name: Dump Logs on Failure
        if: failure()
        run: podman logs vexilon-app

  trivy:
    name: Trivy Security Scan
    needs: [unit_tests, integration_tests]
    if: (! github.event.pull_request.draft)
    permissions:
      security-events: write
    runs-on: ubuntu-slim
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  results:
    name: Results
    needs: [unit_tests, integration_tests, container_build, container_test, trivy]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure')||contains(needs.*.result, 'canceled')
        run: echo "At least one job has failed." && exit 1
      - run: echo "Success!"
