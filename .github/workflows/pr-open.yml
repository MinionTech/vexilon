name: PR Open

# Runs unit tests on pull requests (excluding drafts) and on the weekly schedule.
# Images are built during PRs and promoted on merge — no rebuild on main.
# Smoke tests (tests/smoke/) are excluded — they require a real HF_TOKEN.
#
# This workflow is the required gate for Renovate dependency PRs.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: Check Triggers
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-24.04
    outputs:
      triggered: ${{ steps.diff.outputs.triggered }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - id: diff
        uses: bcgov/actions/diff-triggers@main
        with:
          triggers: '["./Containerfile", "./pyproject.toml", "./app.py", "./agnav/", "./scripts/", "./prompts/", "./data/", "./tests/", "./.github/workflows/"]'

  cache_validation:
    name: Validate FAISS Cache
    needs: [check, compose_validation]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Start Podman Socket
        run: systemctl --user start podman.socket
      - name: Validate Cache Manifest
        run: podman compose run --rm cache-validator

  compose_validation:
    name: Compose Validation
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Start Podman Socket
        run: systemctl --user start podman.socket
      - name: Validate Compose File
        run: podman compose config

  tests:
    name: Tests and Analysis
    needs: [check, cache_validation, compose_validation]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Start Podman Socket
        run: systemctl --user start podman.socket

      - name: Run Tests and Analysis
        uses: bcgov/action-test-and-analyse@main
        with:
          language: python
          python_version: "3.14"
          dir: .
          # Consistent test execution via podman-compose
          commands: |
            export HF_TOKEN=${{ secrets.HF_TOKEN }}
            mkdir -p reports
            podman compose run --rm tests
          triggers: '["./Containerfile", "./pyproject.toml", "./app.py", "./agnav/", "./scripts/", "./prompts/", "./data/", "./tests/", "./.github/workflows/"]'
          sonar_token: ${{ secrets.SONAR_TOKEN }}

      - name: Upload Test and Security Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agnav-reports
          path: reports/
          retention-days: 5

  container_build:
    name: Build & Push to GHCR
    needs: [check, tests]
    if: needs.check.outputs.triggered == 'true'
    env:
      IMAGE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      triggered: ${{ steps.builder.outputs.triggered }}

    steps:
      - name: Build and Push
        id: builder
        uses: bcgov/action-builder-ghcr@main
        with:
          package: agnav
          build_context: .
          build_file: Containerfile
          tags: sha-${{ env.IMAGE_SHA }}
          build_args: |
            VERSION=sha-${{ env.IMAGE_SHA }}
            REPO_URL=https://github.com/${{ github.repository }}

  container_test:
    name: Container Smoke Test
    needs: container_build
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Smoke Test Model
        run: |
          echo "Waiting for Ollama to be ready..."
          until curl -s http://localhost:11434 > /dev/null; do sleep 1; done
          echo "Pulling qwen3:0.6b..."
          curl -X POST http://localhost:11434/api/pull -d '{"name": "qwen3:0.6b"}'

      - name: Run AgNav Container
        env:
          IMAGE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          IMAGE="ghcr.io/${OWNER,,}/${REPO,,}/agnav:sha-${IMAGE_SHA}"
          podman pull $IMAGE
          
          # Run with host network to reach Ollama on localhost:11434
          podman run -d \
            --name agnav-smoke \
            --network host \
            -e AGNAV_LLM_PROVIDER=ollama \
            -e OLLAMA_MODEL=qwen3:0.6b \
            -e OLLAMA_HOST=localhost \
            -e AGNAV_VERSION=sha-${IMAGE_SHA} \
            -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
            $IMAGE

      - name: Wait for Healthcheck
        run: |
          for i in {1..60}; do
            if curl -f http://localhost:7860 > /dev/null 2>&1; then
              echo "Container is healthy!"
              exit 0
            fi

            if ! podman inspect agnav-smoke --format '{{.State.Running}}' 2>/dev/null | grep -q 'true'; then
              echo "Container died! Logs:"
              podman logs agnav-smoke
              exit 1
            fi

            echo "Wait... ($i/60)"
            sleep 5
          done
          echo "Healthcheck timed out."
          exit 1

      - name: Cleanup
        if: always()
        run: podman rm -f agnav-smoke || true

  trivy:
    name: Trivy Security Scan
    needs: [check, tests]
    if: needs.check.outputs.triggered == 'true'
    permissions:
      security-events: write
    runs-on: ubuntu-slim
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  semgrep:
    name: Semgrep Security Scan
    needs: [check]
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/secrets
            p/owasp-top-10
          generateSarif: "1"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  results:
    name: Results
    needs: [check, tests, container_build, container_test, trivy, semgrep]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'canceled')
        run: |
          echo "At least one required job has failed or was canceled."
          exit 1
      - run: echo "All critical checks passed or were intentionally skipped."
