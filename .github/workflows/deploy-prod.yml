name: Deploy PROD

on:
  release:
    types: [published]

permissions: {}

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and verify image (with historical fallback)
        id: resolve
        uses: bcgov/actions/commit-to-package@fix/squash-merge-resolution
        with:
          images: "vexilon=ghcr.io/${{ github.repository_owner }}/vexilon"
          max_depth: 50

      - name: Push image-based stub to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          DIGEST=$(echo '${{ steps.resolve.outputs.bundle }}' | jq -r '.vexilon')
          ./.github/scripts/deploy.sh "$DIGEST" --prod

      - name: Verify Space boots successfully
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./.github/scripts/verify_deployment.sh "DerekRoberts/vexilon"
      - name: Notify Owners on Failure
        if: failure()
        uses: bcgov/actions/workflow-notifier@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "PROD Deployment Failure: Vexilon"
          labels: "critical,deployment,prod"
