name: Deploy PROD (Strict Consumer)

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  attestations: read

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verified Production Deploy (The Auditor)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/deploy.sh "DerekRoberts/vexilon"
