name: Deploy PROD

on:
  release:
    types: [published]

permissions: {}

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve image
        id: resolve
        uses: bcgov/actions/image-tracker@main
        with:
          package: agnav
          token: ${{ github.token }}
          revision: ${{ github.sha }}
          max_depth: 20

      - name: Promote and Verify to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TEST: "true"
        run: |
          TAG=$(echo '${{ steps.resolve.outputs.images }}' | jq -r '.agnav')
          ./.github/scripts/deploy.sh "MinionTech/vexilon" "$TAG"

      - name: Notify Owners on Failure
        if: failure()
        uses: bcgov/actions/workflow-notifier@v0.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "PROD Deployment Failure: Agreement Navigator (AgNav)"
          labels: "critical,deployment,prod"
