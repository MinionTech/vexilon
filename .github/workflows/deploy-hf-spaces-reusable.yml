name: Deploy to Hugging Face Spaces (Reusable)

on:
  workflow_call:
    inputs:
      space_name:
        description: 'The target Hugging Face Space (e.g., DerekRoberts/landru)'
        required: true
        type: string
      environment:
        description: 'The GitHub environment to deploy to (e.g., test, prod)'
        required: true
        type: string
    secrets:
      HF_TOKEN:
        required: true

jobs:
  deploy:
    name: Push to ${{ inputs.space_name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false

      - name: Push code-only snapshot to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote add hf "https://DerekRoberts:${HF_TOKEN}@huggingface.co/spaces/${{ inputs.space_name }}"
          COMMIT_MSG=$(git log -1 --format='%s')
          git checkout --orphan hf-snapshot
          git rm --cached -r pdf_cache/
          git commit -m "deploy: $COMMIT_MSG"
          git push hf hf-snapshot:main --force
