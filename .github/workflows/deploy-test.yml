name: Deploy TEST

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy, e.g. sha-abc123def...'
        required: false
  push:
    branches:
      - main

permissions: {}

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
      packages: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve image
        id: resolve
        if: ${{ !inputs.image_tag }}
        uses: bcgov/actions/image-tracker@main
        with:
          package: agnav
          token: ${{ github.token }}
          revision: ${{ github.event.pull_request.head.sha || github.sha }}
          max_depth: 20

      - name: Push image-based stub to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -x
          ./.github/scripts/deploy.sh "DerekRoberts/landru" "${{ steps.resolve.outputs.image }}"

      - name: Verify Space boots successfully
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./.github/scripts/verify_deployment.sh "DerekRoberts/landru"

      - name: Notify Owners on Failure
        if: failure()
        uses: bcgov/actions/workflow-notifier@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "TEST Deployment Failure: Vexilon"
          labels: "failure,deployment,test"
