name: Deploy TEST

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy, e.g. sha-abc123def...'
        required: false
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'pdf_cache/**'

permissions: {}

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
      packages: read
      pull-requests: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and verify image
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            # Manual dispatch — use provided tag
            TAG="${{ inputs.image_tag }}"
          else
            # Push to main — look up the PR that was merged at this commit
            PR_HEAD_SHA=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '.[0].head.sha')
            if [ -z "$PR_HEAD_SHA" ] || [ "$PR_HEAD_SHA" = "null" ]; then
              echo "::error::No PR found for commit ${{ github.sha }}"
              exit 1
            fi
            TAG="sha-${PR_HEAD_SHA}"
          fi

          # Resolve tag to immutable digest
          declare -l IMAGE="ghcr.io/${{ github.repository }}:${TAG}"
          DIGEST=$(skopeo inspect "docker://${IMAGE}" --format '{{.Digest}}')
          if [ -z "$DIGEST" ]; then
            echo "::error::Could not resolve digest for ${IMAGE}"
            exit 1
          fi

          # Verify attestation — cryptographic proof this image was built from the expected commit
          declare -l FULL_IMAGE="ghcr.io/${{ github.repository }}@${DIGEST}"
          gh attestation verify "${FULL_IMAGE}" --owner "${{ github.repository_owner }}" || {
            echo "::error::Attestation verification failed for ${FULL_IMAGE}"
            exit 1
          }

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Verified: ${FULL_IMAGE}"

      - name: Push image-based stub to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./.github/scripts/deploy.sh "${{ steps.resolve.outputs.digest }}"
