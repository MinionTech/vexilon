name: Deploy TEST

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy, e.g. sha-abc123def...'
        required: false
  push:
    branches:
      - main

permissions: {}

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
      packages: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50



      - name: Resolve and verify image
        id: resolve
        uses: bcgov/actions/commit-to-package@main
        with:
          images: "vexilon=ghcr.io/${{ github.repository }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          max_depth: 50

      - name: Push image-based stub to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          DIGEST=$(echo '${{ steps.resolve.outputs.bundle }}' | jq -r '.vexilon')
          ./.github/scripts/deploy.sh "$DIGEST"

      - name: Verify Space boots successfully
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./.github/scripts/verify_deployment.sh "DerekRoberts/landru"
      - name: Notify Owners on Failure
        if: failure()
        uses: bcgov/actions/workflow-notifier@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "TEST Deployment Failure: Vexilon"
          labels: "failure,deployment,test"
