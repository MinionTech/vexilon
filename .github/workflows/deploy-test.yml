name: Deploy TEST

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy, e.g. sha-abc123def...'
        required: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
      packages: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve image
        id: resolve
        if: ${{ !inputs.image_tag }}
        uses: bcgov/actions/image-tracker@feat/image-tracker-digest-resolver
        with:
          package: vexilon/agnav
          token: ${{ github.token }}
          revision: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Push image-based stub to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          TAG=$(echo '${{ steps.resolve.outputs.bundle }}' | jq -r '.["vexilon/agnav"]')
          set -x
          ./.github/scripts/deploy.sh "DerekRoberts/landru" "$TAG"

      - name: Verify Space boots successfully
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./.github/scripts/verify_deployment.sh "DerekRoberts/landru"

      - name: Notify Owners on Failure
        if: failure()
        uses: bcgov/actions/workflow-notifier@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "TEST Deployment Failure: Vexilon"
          labels: "failure,deployment,test"
