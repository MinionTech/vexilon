name: Deploy TEST

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

# Serialized deployments to prevent race conditions on the environment
concurrency:
  group: deploy-test
  cancel-in-progress: false

permissions:
  packages: write
  contents: read

jobs:
  deploy-test:
    name: Promote & Deploy to TEST
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: test
    
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      SOURCE_TAG: pr-${{ github.event.pull_request.number }}
      TARGET_TAG: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag Image in GHCR
        # Retag the PR-specific source to the environment-wide 'test' tag
        run: |
          skopeo copy --all \
            docker://${{ env.IMAGE_NAME }}:${{ env.SOURCE_TAG }} \
            docker://${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }}

      - name: Push Stub to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Deploy using the 'test' pointer
        run: ./scripts/deploy.sh --stub "${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }}" "DerekRoberts/landru"
